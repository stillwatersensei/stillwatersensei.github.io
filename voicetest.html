<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stillwater Voice Test (MP3)</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1f5f5b;
      color: #e8f5f2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: rgba(0,0,0,0.25);
      padding: 24px;
      border-radius: 20px;
      max-width: 500px;
      text-align: center;
    }
    textarea {
      width: 100%;
      height: 100px;
      margin: 10px 0;
    }
    button {
      margin: 6px;
      padding: 10px 16px;
      border-radius: 20px;
      border: none;
      background: #6fd3c8;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Stillwater Voice + Music Test</h1>

    <textarea id="text">
Let the breath rise and fall. Sit tall with both feet grounded.
    </textarea>

    <div>
      <button onclick="playBoth()">Voice + Music</button>
      <button onclick="voiceOnly()">Voice Only</button>
      <button onclick="musicOnly()">Music Only</button>
      <button onclick="stopAll()">Stop</button>
    </div>

    <p id="status">Ready</p>
  </div>

<script>
let audio = new Audio("assets/audio/closing.mp3");
audio.loop = true;
audio.volume = 0.5;

function playBoth(){
  audio.play().catch(()=>{});
  speak();
}

function voiceOnly(){
  stopMusic();
  speak();
}

function musicOnly(){
  stopVoice();
  audio.play().catch(()=>{});
}

function speak(){
  const utter = new SpeechSynthesisUtterance(
    document.getElementById("text").value
  );
  utter.rate = 0.85;
  utter.pitch = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function stopMusic(){
  audio.pause();
  audio.currentTime = 0;
}

function stopVoice(){
  speechSynthesis.cancel();
}

function stopAll(){
  stopMusic();
  stopVoice();
}
</script>
</body>
</html>
