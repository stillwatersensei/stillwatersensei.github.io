<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stillwater Voice Test v19</title>
  <link rel="stylesheet" href="style.css?v=19" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="index.html?v=19"><img src="assets/sage/logo-sage.png" class="brand-avatar" alt="Sage logo"><span><strong>Stillwater</strong><em>Voice Test</em></span></a>
    </header>
    <main class="opening">
      <section class="hero-card">
        <div class="sage-stage opening-sage"><img src="assets/sage/idle-frames/frame-01.png?v=19" class="sage-img" alt="Sage"></div>
        <h1>Browser Voice Test</h1>
        <p>This build uses the same browser voice selector and default levels as the main app.</p>
        <button id="testVoice" class="begin primary">Play Test Voice</button>
      </section>
    </main>
  </div>
  <script>
    const line='Let the breath rise and fall. Sit tall with both feet grounded.';
    document.getElementById('testVoice').onclick=()=>{speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(line); u.rate=.95; u.pitch=.85; u.volume=.78; speechSynthesis.speak(u);};
  </script>
</body>
</html>
